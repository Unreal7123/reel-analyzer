# fly.toml — Fly.io deployment config for ReelScan backend
# Usage: fly launch --config fly.toml

app = "reelscan-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.backend"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  ROOT_PATH = ""
