services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: reelscan-backend
    restart: unless-stopped
    # Load .env file if present (never commit real tokens to git)
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      # Uncomment and fill these to enable authenticated scraping
      # (or set them in .env — see .env.example)
      # - INSTAGRAM_SESSIONID=
      # - INSTAGRAM_CSRFTOKEN=
      # - INSTAGRAM_DS_USER_ID=
      # - INSTAGRAM_MID=
      # - INSTAGRAM_IG_DID=
      # - FACEBOOK_ACCESS_TOKEN=
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s   # Playwright + spaCy import takes ~30-40 s cold-start

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: reelscan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
