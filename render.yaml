services:
  # ── Backend Web Service ──────────────────────────────────────────────────
  - type: web
    name: reelscan-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ROOT_PATH
        value: ""
      - key: CORS_ORIGINS
        value: https://reelscan-frontend.onrender.com
    healthCheckPath: /health

  # ── Frontend Static Site ─────────────────────────────────────────────────
  - type: web
    name: reelscan-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://reelscan-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
